# FreeRADIUS Client Configuration

# Localhost (for testing with radtest)
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    require_message_authenticator = no
    nas_type = other
}

client localhost_ipv6 {
    ipv6addr = ::1
    secret = testing123
}

# UniFi AP U7 Pro XGS
client u7-pro-xgs {
    ipaddr = 192.168.5.100
    secret = ${RADIUS_SECRET}
    shortname = u7-pro-xgs
    nas_type = other
    require_message_authenticator = no
}
